services:
    app:
        extends:
            file: ./compose.base.yml
            service: base
        command: ["npm", "run", "dev"]
        ports:
            - "3000:3000"
        environment:
            NODE_ENV: development
            PORT: 3000
            MONGO_URI: mongodb://dbh.pipefish-mermaid.ts.net:27017/kumbukum?replicaSet=hmrs0
            # MONGO_URI: mongodb://mongo:27017/kumbukum?replicaSet=rs0
            REDIS_URL: redis://redis:6379
            TYPESENSE_HOST: typesense
            TYPESENSE_PORT: 8108
            TYPESENSE_PROTOCOL: http
            TYPESENSE_API_KEY: kumbukum-dev-key
            TYPESENSE_NODES: ""
            SESSION_SECRET: dev-session-secret-change-me
            JWT_SECRET: dev-jwt-secret-change-me
            SMTP_HOST: "mailpit"
            SMTP_PORT: 1025
            SMTP_USER: ""
            SMTP_PASS: ""
            SMTP_FROM: "noreply@localhost"
            LLM_PROVIDER: openai
            LLM_API_KEY: ""
            LLM_MODEL: ""
            APP_URL: http://localhost:3000
            SYSADMIN_EMAIL: "sysadmin@localhost"
            SYSADMIN_PASSWORD: "sysadminpassword"
        dns:
            - 100.100.100.100
        depends_on:
            # mongo-init:
            #     condition: service_completed_successfully
            redis:
                condition: service_started
            typesense:
                condition: service_started

    # mongo:
    #     image: percona/percona-server-mongodb:6.0
    #     ports:
    #         - "27017:27017"
    #     volumes:
    #         - mongo_data:/data/db
    #     command: mongod --setParameter perconaTelemetry=false --replSet rs0 --bind_ip_all
    #     environment:
    #         PERCONA_TELEMETRY_DISABLE: 1

    # mongo-init:
    #     image: percona/percona-server-mongodb:6.0
    #     depends_on:
    #         mongo:
    #             condition: service_started
    #     volumes:
    #         - ./docker/mongo-init-replset.sh:/docker-entrypoint-initdb.d/init.sh:ro
    #     entrypoint: /bin/bash
    #     command: /docker-entrypoint-initdb.d/init.sh
    #     environment:
    #         PERCONA_TELEMETRY_DISABLE: 1
    #         MONGO_HOST: mongo

    redis:
        image: redis:8
        command: redis-server --appendonly yes --port 6379 --save ""
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    typesense:
        image: typesense/typesense:30.1
        ports:
            - "8108:8108"
        volumes:
            - typesense_data:/data
        command: --data-dir /data --api-key=kumbukum-dev-key

    # ── Mailpit (dev mail catcher) ──────────────────────────────
    mailpit:
        image: axllent/mailpit:latest
        restart: unless-stopped
        ports:
            - "8025:8025"   # Web UI
        expose:
            - "1025"        # SMTP

volumes:
    node_modules:
    pnpm_store:
    mongo_data:
    typesense_data:
    redis_data:

